<!DOCTYPE html>
<html>
<head>
    <title>Generate Marksheet</title>
    <style>
        body{
            font-family:Arial;
            padding:20px;
            background:#f5f9ff;
        }
        .box{
            background:white;
            padding:20px;
            border-radius:10px;
            max-width:600px;
            margin:auto;
            box-shadow:0 0 10px #ccc;
        }
        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }
        button{
            background:#004aad;
            color:white;
            padding:10px 20px;
            border:none;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Generate Student Marksheet</h2>

    <input type="text" placeholder="Student Name">
    <input type="text" placeholder="Roll Number">
    <input type="text" placeholder="Course">
    <input type="number" placeholder="Computer">
    <input type="number" placeholder="Typing">
    <input type="number" placeholder="Practical">

    <button onclick="window.print()">
        Download Marksheet
    </button>
</div>

</body>
</html>
