<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Marksheet - Aditya Computer Academy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f5fa;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#004aad;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid #ddd;
}

th,td{
    padding:10px;
    text-align:center;
}

button{
    margin-top:20px;
    background:#004aad;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    background:#f8f8f8;
    padding:20px;
    border-radius:5px;
}
</style>
</head>
<body>

<div class="container">

<h1>Generate Marksheet</h1>

<div class="form-group">
<label>Enrollment No.</label>
<input type="text" id="roll">
</div>

<div class="form-group">
<label>Student Name</label>
<input type="text" id="name">
</div>

<table>
<tr>
<th>Subject</th>
<th>Marks</th>
</tr>

<tr>
<td>Computer Fundamentals</td>
<td><input type="number" id="m1"></td>
</tr>

<tr>
<td>MS Word</td>
<td><input type="number" id="m2"></td>
</tr>

<tr>
<td>MS Excel</td>
<td><input type="number" id="m3"></td>
</tr>

<tr>
<td>PowerPoint</td>
<td><input type="number" id="m4"></td>
</tr>

<tr>
<td>Practical</td>
<td><input type="number" id="m5"></td>
</tr>

</table>

<button onclick="calculate()">Generate Marksheet</button>

<div class="result" id="result"></div>

</div>

<script>
function calculate(){

let m1=parseInt(document.getElementById("m1").value)||0;
let m2=parseInt(document.getElementById("m2").value)||0;
let m3=parseInt(document.getElementById("m3").value)||0;
let m4=parseInt(document.getElementById("m4").value)||0;
let m5=parseInt(document.getElementById("m5").value)||0;

let total=m1+m2+m3+m4+m5;
let percent=(total/500)*100;

let grade="F";
let result="FAIL";

if(percent>=80){
grade="A+";
result="PASS";
}
else if(percent>=60){
grade="A";
result="PASS";
}
else if(percent>=45){
grade="B";
result="PASS";
}
else if(percent>=33){
grade="C";
result="PASS";
}

document.getElementById("result").innerHTML=
`
<h3>MARKSHEET</h3>
<p><b>Enrollment:</b> ${document.getElementById("roll").value}</p>
<p><b>Name:</b> ${document.getElementById("name").value}</p>
<p><b>Total:</b> ${total}/500</p>
<p><b>Percentage:</b> ${percent.toFixed(2)}%</p>
<p><b>Grade:</b> ${grade}</p>
<p><b>Result:</b> ${result}</p>
`;
}
</script>

</body>
</html>
