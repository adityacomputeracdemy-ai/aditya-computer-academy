<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f7fa;
}

.header{
    background:#004aad;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:20px auto;
}

.profile{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card a{
    text-decoration:none;
    color:#004aad;
    font-weight:bold;
}

h2{
    color:#004aad;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
    <h1>Aditya Computer Academy</h1>
    <h3>Student Dashboard</h3>
</div>

<div class="container">

<div class="profile">
    <h2>Student Profile</h2>
    <p><b>Name:</b> Rahul Kumar</p>
    <p><b>Enrollment No:</b> ACA250001</p>
    <p><b>Course:</b> ADCA</p>
    <p><b>Session:</b> 2026-27</p>
    <p><b>Status:</b> Active</p>
</div>

<div class="cards">

<div class="card">
    <h3>📄 Marksheet</h3>
    <a href="generate-marksheet.html">View</a>
</div>

<div class="card">
    <h3>🎓 Certificate</h3>
    <a href="certificate-verification.html">View</a>
</div>

<div class="card">
    <h3>💳 Fee Status</h3>
    <a href="online-fee-payment.html">View</a>
</div>

<div class="card">
    <h3>📝 Attendance</h3>
    <a href="attendance-management.html">View</a>
</div>

<div class="card">
    <h3>🪪 ID Card</h3>
    <a href="id-card.html">View</a>
</div>

<div class="card">
    <h3>📋 Admit Card</h3>
    <a href="admit-card.html">View</a>
</div>

</div>

</div>

</body>
</html>
