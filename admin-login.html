<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Aditya Computer Academy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#004aad,#00aaff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    color:#004aad;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#004aad;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#003080;
}

a{
    text-decoration:none;
    color:#004aad;
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<form>
<input type="text" placeholder="Admin Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<br>
<a href="index.html">← Back to Home</a>

</div>

</body>
</html>
