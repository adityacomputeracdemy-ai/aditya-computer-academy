<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body{
    font-family:Arial;
    background:#f5f7fa;
}

.container{
    max-width:400px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#004aad;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#004aad;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<input type="text"
id="username"
placeholder="Admin Username">

<input type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<div class="error" id="error"></div>

</div>

<script>
function login(){

let user =
document.getElementById("username").value;

let pass =
document.getElementById("password").value;

if(user=="admin" && pass=="123456")
{
window.location="admin-dashboard.html";
}
else
{
document.getElementById("error")
.innerHTML="Invalid Username or Password";
}
}
</script>

</body>
</html>
