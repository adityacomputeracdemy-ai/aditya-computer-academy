<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Management - Aditya Computer Academy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fa;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#004aad;
    margin-bottom:20px;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

button{
    background:#004aad;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table,th,td{
    border:1px solid #ddd;
}

th{
    background:#004aad;
    color:white;
}

th,td{
    padding:12px;
    text-align:center;
}

.status{
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Database Management</h1>

<input type="text" placeholder="Search Student by Name or Enrollment Number">

<div class="actions">
    <button>Add Student</button>
    <button>Import Data</button>
    <button>Export Data</button>
    <button>Backup Database</button>
    <button>Restore Database</button>
</div>

<table>

<tr>
<th>Enrollment</th>
<th>Student Name</th>
<th>Course</th>
<th>Mobile</th>
<th>Result</th>
<th>Status</th>
</tr>

<tr>
<td>ACA250001</td>
<td>Rahul Kumar</td>
<td>ADCA</td>
<td>9876543210</td>
<td>PASS</td>
<td class="status">Active</td>
</tr>

<tr>
<td>ACA250002</td>
<td>Amit Singh</td>
<td>DCA</td>
<td>9876543211</td>
<td>PASS</td>
<td class="status">Active</td>
</tr>

<tr>
<td>ACA250003</td>
<td>Priya Sharma</td>
<td>CCC</td>
<td>9876543212</td>
<td>PASS</td>
<td class="status">Active</td>
</tr>

</table>

</div>

</body>
</html>
