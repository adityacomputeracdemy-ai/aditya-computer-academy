<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Admission - Aditya Computer Academy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fc;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#004aad;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#004aad;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.success{
    display:none;
    margin-top:20px;
    background:#d4edda;
    color:#155724;
    padding:15px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>Online Admission Form</h1>

<form onsubmit="submitForm(event)">

<div class="form-group">
<label>Student Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Father's Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" required>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email">
</div>

<div class="form-group">
<label>Select Course</label>
<select required>
<option>ADCA</option>
<option>DCA</option>
<option>CCC</option>
<option>PGDCA</option>
<option>Tally Prime</option>
<option>MS Office</option>
</select>
</div>

<div class="form-group">
<label>Upload Photo</label>
<input type="file">
</div>

<div class="form-group">
<label>Address</label>
<textarea rows="4"></textarea>
</div>

<button type="submit">
Submit Admission
</button>

</form>

<div class="success" id="msg">
✅ Admission Form Submitted Successfully!
</div>

</div>

<script>
function submitForm(e){
e.preventDefault();
document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
