<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>
<style>
body{
    font-family:Arial;
    background:#f5f9ff;
}
.box{
    width:320px;
    margin:100px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    width:100%;
    padding:10px;
    background:#004aad;
    color:white;
    border:none;
}
</style>
</head>
<body>

<div class="box">
    <h2>Student Login</h2>

    <input type="text" placeholder="Student ID">
    <input type="password" placeholder="Password">

    <button onclick="window.location='student-dashboard.html'">
        Login
    </button>
</div>

</body>
</html>
