<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification - Aditya Computer Academy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fc;
}

.container{
    max-width:700px;
    margin:50px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#004aad;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#004aad;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.result{
    margin-top:20px;
    padding:20px;
    background:#f8f9fa;
    border-radius:5px;
    display:none;
}

.valid{
    color:green;
    font-weight:bold;
}

.invalid{
    color:red;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>Certificate Verification</h1>

<input type="text" id="certno"
placeholder="Enter Certificate Number">

<button onclick="verifyCertificate()">
Verify Certificate
</button>

<div class="result" id="result"></div>

</div>

<script>
function verifyCertificate(){

let cert =
document.getElementById("certno").value;

let result =
document.getElementById("result");

if(cert=="ACA2026001"){

result.style.display="block";

result.innerHTML=`
<h3 class="valid">✓ Certificate Verified</h3>
<hr><br>
<p><b>Student Name:</b> Rahul Kumar</p>
<p><b>Course:</b> ADCA</p>
<p><b>Certificate No:</b> ACA2026001</p>
<p><b>Issue Date:</b> 30/06/2026</p>
<p><b>Status:</b> Valid</p>
`;

}else{

result.style.display="block";

result.innerHTML=`
<h3 class="invalid">
✗ Invalid Certificate Number
</h3>
`;
}

}
</script>

</body>
</html>
