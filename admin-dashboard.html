<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fa;
}

.header{
    background:#004aad;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:20px auto;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card h3{
    color:#004aad;
    margin-bottom:15px;
}

.card a{
    text-decoration:none;
    background:#004aad;
    color:white;
    padding:10px 20px;
    border-radius:5px;
    display:inline-block;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.stat h2{
    color:#004aad;
}
</style>
</head>

<body>

<div class="header">
    <h1>Aditya Computer Academy</h1>
    <h3>Admin Dashboard</h3>
</div>

<div class="container">

<div class="stats">
    <div class="stat">
        <h2>250</h2>
        <p>Total Students</p>
    </div>

    <div class="stat">
        <h2>15</h2>
        <p>Total Courses</p>
    </div>

    <div class="stat">
        <h2>8</h2>
        <p>Staff Members</p>
    </div>

    <div class="stat">
        <h2>₹1,50,000</h2>
        <p>Total Fees</p>
    </div>
</div>

<div class="cards">

<div class="card">
<h3>Add Student</h3>
<a href="add-student.html">Open</a>
</div>

<div class="card">
<h3>Manage Students</h3>
<a href="manage-students.html">Open</a>
</div>

<div class="card">
<h3>Generate Marksheet</h3>
<a href="generate-marksheet.html">Open</a>
</div>

<div class="card">
<h3>Certificate Verify</h3>
<a href="certificate-verification.html">Open</a>
</div>

<div class="card">
<h3>Attendance</h3>
<a href="attendance-management.html">Open</a>
</div>

<div class="card">
<h3>Fee Payment</h3>
<a href="online-fee-payment.html">Open</a>
</div>

<div class="card">
<h3>ID Card</h3>
<a href="id-card.html">Open</a>
</div>

<div class="card">
<h3>Student Search</h3>
<a href="student-search.html">Open</a>
</div>

</div>

</div>

</body>
</html>
