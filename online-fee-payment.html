<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Fee Payment - Aditya Computer Academy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fa;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#004aad;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#004aad;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.receipt{
    display:none;
    margin-top:20px;
    background:#f8f9fa;
    padding:20px;
    border-radius:5px;
    border-left:5px solid green;
}
</style>
</head>
<body>

<div class="container">

<h1>Online Fee Payment</h1>

<div class="form-group">
<label>Enrollment Number</label>
<input type="text" id="enroll">
</div>

<div class="form-group">
<label>Student Name</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>Course</label>
<input type="text" id="course">
</div>

<div class="form-group">
<label>Amount</label>
<input type="number" id="amount">
</div>

<div class="form-group">
<label>Payment Method</label>
<select id="payment">
<option>UPI</option>
<option>PhonePe</option>
<option>Google Pay</option>
<option>Paytm</option>
<option>Cash</option>
</select>
</div>

<button onclick="payFee()">
Pay Fee
</button>

<div class="receipt" id="receipt">

<h2>Payment Receipt</h2>
<hr><br>

<p><b>Enrollment:</b> <span id="r1"></span></p>
<p><b>Name:</b> <span id="r2"></span></p>
<p><b>Course:</b> <span id="r3"></span></p>
<p><b>Amount:</b> ₹<span id="r4"></span></p>
<p><b>Payment Mode:</b> <span id="r5"></span></p>

<br>

<button onclick="window.print()">
Print Receipt
</button>

</div>

</div>

<script>
function payFee(){

document.getElementById("receipt").style.display="block";

document.getElementById("r1").innerHTML=
document.getElementById("enroll").value;

document.getElementById("r2").innerHTML=
document.getElementById("name").value;

document.getElementById("r3").innerHTML=
document.getElementById("course").value;

document.getElementById("r4").innerHTML=
document.getElementById("amount").value;

document.getElementById("r5").innerHTML=
document.getElementById("payment").value;
}
</script>

</body>
</html>
